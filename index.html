<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArcMemoAI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 ArcMemoAI</h1>

<p class="subtitle">
AI-powered Arc Transaction Memo Generator
</p>

<button id="connectBtn">
🔗 Connect Wallet
</button>

<div id="walletBox" class="wallet-box">
Wallet not connected
</div>

<hr>

<h2>Create Payment</h2>

<label>Recipient Address</label>

<input
type="text"
id="recipient"
placeholder="0x..."
>

<label>Amount (USDC)</label>

<input
type="number"
id="amount"
placeholder="10"
step="0.01"
>

<label>Purpose</label>

<textarea
id="purpose"
placeholder="Example: Website design payment"
></textarea>

<button id="generateBtn">
 Generate AI Memo
</button>

<pre id="memoBox" class="memo-box">
Your generated memo will appear here...
</pre>

<button id="sendBtn">
💸 Send Payment
</button>

<a id="txLink" target="_blank" style="display:none">
View Transaction
</a>

<div id="status" class="status"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
