<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>momoAI — USDC Payment Assistant</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta property="og:image" content="https://memoarc.xyz/logo.png">
  <a href="index.html" style="display:contents;text-decoration:none;">
    <img src="images/momoai-logo-512.png" class="logo-mark" alt="momoAI">
  </a>
  <div class="logo-text">
    <span class="logo-name">momoAI <span class="net-badge"><span class="net-dot"></span>Arc Testnet</span></span>
    <span class="logo-sub">USDC Payment Assistant</span>
  </div>
  <button class="wallet-pill" id="walletBtn" onclick="connectWallet()">Connect Wallet</button>
</header>

<div id="status"></div>

<!-- Payment Form -->
<div class="card">
  <div class="card-label">New Payment</div>

  <div class="field">
    <label>Recipient Address</label>
    <input type="text" id="toAddr" class="mono" placeholder="0x..." autocomplete="off" />
  </div>

  <div class="field">
    <label>Amount</label>
    <div class="amount-row">
      <input type="number" id="amount" placeholder="0.00" min="0" step="any" />
      <div class="currency-badge">USDC</div>
    </div>
  </div>

  <div class="field">
    <label>Description <span class="hint">what is this payment for?</span></label>
    <input type="text" id="description" placeholder="e.g. Website design payment" />
  </div>

  <div class="field">
    <label>AI Memo <span class="ai-tag">✦ AI-generated</span></label>
    <div class="memo-box">
      <textarea id="memo" placeholder="Fill in the fields above, then click Generate…"></textarea>
      <button class="memo-generate-btn" id="generateBtn" onclick="generateMemo()">
        <span class="spark">✦</span> Generate
      </button>
    </div>
    <div class="ai-thinking" id="aiThinking">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      momoAI is writing your memo…
    </div>
  </div>

  <button class="send-btn" id="sendBtn" onclick="sendPayment()">Send Payment</button>
</div>

<div class="section-tabs">
  <button class="tab-btn active" id="tabHistoryBtn" onclick="switchTab('history')">Payment History</button>
  <button class="tab-btn" id="tabRecurringBtn" onclick="switchTab('recurring')">Recurring Payments</button>
</div>

<div class="tab-panel active" id="historyPanel">
  <div class="card history-card">
    <div class="history-header">
      <div class="card-label" style="margin-bottom:0">Payment History</div>
      <button class="clear-btn" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No payments yet. Send your first one above.</div>
    </div>
  </div>
</div>

<div class="tab-panel" id="recurringPanel">
  <div class="card">
    <div class="card-label">Recurring Payments</div>

    <div class="field">
      <label>Recipient Address</label>
      <input type="text" id="recurTo" class="mono" placeholder="0x..." autocomplete="off" />
    </div>

    <div class="field">
      <label>Amount</label>
      <div class="amount-row">
        <input type="number" id="recurAmount" placeholder="0.00" min="0" step="any" />
        <div class="currency-badge">USDC</div>
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <input type="text" id="recurDescription" placeholder="e.g. Monthly rent" />
    </div>

    <div class="field">
      <label>Repeat every (days)</label>
      <input type="number" id="recurInterval" placeholder="e.g. 1 for daily, 7 for weekly" min="1" step="1" />
    </div>

    <button class="send-btn" id="createRecurBtn" onclick="createRecurring()">Create Recurring Payment</button>

    <div id="recurringList" style="margin-top:16px;"></div>
  </div>
</div>
<script>
  const ARC_CHAIN_ID = 5042002;
  const ARC_CHAIN_HEX = '0x4CEF52';
  const ARC_RPC = 'https://rpc.testnet.arc.network';
  const ARC_EXPLORER = 'https://testnet.arcscan.app';
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
